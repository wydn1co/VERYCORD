<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify — Server Access</title>
    <meta name="description" content="Complete verification to gain access to the server">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="server-icon" id="serverIcon">V</div>
            <h1 id="serverName">Verification</h1>
            <p class="subtitle">Complete a quick verification to unlock full server access. This only takes a few seconds.</p>

            <a href="#" class="btn-verify" id="verifyBtn" onclick="startVerify()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/>
                </svg>
                Verify with Discord
            </a>

            <div class="info-list">
                <div class="info-item">
                    <div class="icon icon-shield">🛡️</div>
                    <span>Protects the server from raids and bots</span>
                </div>
                <div class="info-item">
                    <div class="icon icon-lock">🔒</div>
                    <span>Secure OAuth2 verification via Discord</span>
                </div>
                <div class="info-item">
                    <div class="icon icon-check">⚡</div>
                    <span>Instant access after verification</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Powered by Verification System</p>
        </div>
    </div>

    <script>
    (function() {
        // grab query params for customization
        var params = new URLSearchParams(window.location.search);
        var guild = params.get('guild');
        var name = params.get('name');
        var user = params.get('user');

        if (name) {
            document.getElementById('serverName').textContent = name;
            document.getElementById('serverIcon').textContent = name.charAt(0).toUpperCase();
            document.title = 'Verify — ' + name;
        }

        // update verify link
        window.startVerify = function() {
            var url = '/auth/discord';
            var qs = [];
            if (guild) qs.push('guild=' + guild);
            if (user) qs.push('user=' + user);
            if (qs.length) url += '?' + qs.join('&');
            window.location.href = url;
        };
    })();
    </script>
</body>
</html>
